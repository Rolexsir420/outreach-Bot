<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Outreach Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 500px; padding: 40px; }
        h1 { color: #333; margin-bottom: 30px; text-align: center; font-size: 28px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; color: #555; font-weight: 500; margin-bottom: 8px; }
        input[type="file"], textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-family: inherit; font-size: 14px; }
        textarea { resize: vertical; min-height: 120px; }
        .hint { font-size: 12px; color: #999; margin-top: 5px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-weight: 500; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { display: none; text-align: center; color: #667eea; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Outreach Bot</h1>
        <form id="outreachForm">
            <div class="form-group">
                <label>📋 Upload CSV File</label>
                <input type="file" id="csv_file" name="csv_file" accept=".csv" required>
                <div class="hint">Must have: uid, username, name columns</div>
            </div>
            <div class="form-group">
                <label>💬 Your Message</label>
                <textarea id="msg" name="message" placeholder="Hi {name}! Join our community" required></textarea>
                <div class="hint">Use {name} to personalize</div>
            </div>
            <button type="submit" id="submitBtn">Send to All Users</button>
        </form>
        <div class="loading" id="loading"><div class="spinner"></div><p>Sending messages...</p></div>
        <div id="resultDiv" class="message" style="display:none;"></div>
    </div>
    <script>
        document.getElementById('outreachForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('resultDiv');
            submitBtn.disabled = true;
            loading.style.display = 'block';
            resultDiv.style.display = 'none';
            const formData = new FormData();
            formData.append('csv_file', document.getElementById('csv_file').files[0]);
            formData.append('message', document.getElementById('msg').value);
            try {
                const response = await fetch('/send', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.success) {
                    resultDiv.className = 'message success';
                    resultDiv.innerHTML = `✅ Done!<br>Sent: ${data.sent} | Skipped: ${data.skipped} | Failed: ${data.failed}`;
                } else {
                    resultDiv.className = 'message error';
                    resultDiv.innerHTML = `❌ Error: ${data.error}`;
                }
                resultDiv.style.display = 'block';
            } catch (err) {
                resultDiv.className = 'message error';
                resultDiv.innerHTML = `❌ Error: ${err.message}`;
                resultDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
